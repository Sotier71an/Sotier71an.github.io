---
layout: default
---
<header class="topbar">
  <div class="brand">陈晓天个人简历</div>
  <nav>
    <a href="/index.html">首页</a>
    <a href="/blog/">文章</a>
    <button id="themeToggle" class="theme-toggle" type="button">夜间模式</button>
  </nav>
</header>

<div class="layout">
  <aside class="toc">
    <h3>目录</h3>
    <ul id="toc-list"></ul>
  </aside>
  <main id="md-root">
    {{ content }}
    <footer class="resume-footer">
      <span class="pill">打印友好</span>
    </footer>
  </main>
</div>

<script>
  // 主题切换：浅色显示“夜间模式”，夜间显示“浅色模式”
  (function () {
    const btn = document.getElementById('themeToggle');
    const apply = (theme) => {
      document.body.dataset.theme = theme;
      btn.textContent = theme === 'dark' ? '浅色模式' : '夜间模式';
    };
    const saved = localStorage.getItem('theme');
    apply(saved || 'light');
    btn.addEventListener('click', () => {
      const next = (document.body.dataset.theme === 'dark') ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      apply(next);
    });
  })();

  // 目录生成（仅从 Markdown 渲染的标题抽取，H2/H3）
  (function () {
    const root = document.getElementById('md-root');
    const toc = document.getElementById('toc-list');
    const headings = root.querySelectorAll('h2, h3');
    toc.innerHTML = '';
    let idx = 0;
    headings.forEach((h) => {
      if (!h.id) {
        h.id = 'h-' + (h.textContent || 'section').trim().replace(/\s+/g, '-') + '-' + (idx++);
      }
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      a.style.paddingLeft = (h.tagName === 'H2') ? '0px' : '12px';
      li.appendChild(a);
      toc.appendChild(li);
    });
  })();
</script>
