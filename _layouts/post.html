---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="meta">
      发布于 {{ page.date | date: '%Y-%m-%d' }}
      {% if page.tags %} · 标签：{{ page.tags | join: ', ' }}{% endif %}
    </p>
  </header>
  <section id="md-root">
    {{ content }}
  </section>
</article>
