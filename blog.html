---
layout: default
title: 文章列表
permalink: /blog/
styles:
  - /assets/css/style.css
---
<section>
  <h1>文章列表</h1>
  <ul>
    {% for post in site.posts %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
      <span class="pill">{{ post.date | date: '%Y-%m-%d' }}</span>
    </li>
    {% endfor %}
  </ul>
</section>
